name: Discord Notifications

on:
  pull_request:
    types: [opened, closed, reopened]
  workflow_run:
    workflows: [CI, Security, Deploy, Release]
    types: [completed]

permissions:
  contents: read

jobs:
  notify-pr:
    if: github.event_name == 'pull_request'
    uses: LUSKTECH/.github/.github/workflows/discord-pr.yml@main
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

  notify-failure:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    uses: LUSKTECH/.github/.github/workflows/discord-workflow-failure.yml@main
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

  notify-release:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.name == 'Release'
    uses: LUSKTECH/.github/.github/workflows/discord-notify.yml@main
    with:
      status: ${{ github.event.workflow_run.conclusion }}
      title: "Release ${{ github.event.workflow_run.conclusion == 'success' && '✅' || '❌' }}"
      description: "Release workflow ${{ github.event.workflow_run.conclusion }} for ${{ github.repository }}"
      url: ${{ github.event.workflow_run.html_url }}
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
